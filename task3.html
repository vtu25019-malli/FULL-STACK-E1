<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Validation</title>
    <style>
        body { font-family: Arial, sans-serif; background: #e9ecef; display: flex; justify-content: center; padding: 50px; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        .btn { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #error-msg { color: #dc3545; font-size: 14px; margin-bottom: 15px; text-align: center; min-height: 20px;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="text-align:center;">Secure Login</h2>
        <div id="error-msg"></div>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="email" placeholder="Email Address">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault(); // Prevent actual form submission
            
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorDiv = document.getElementById("error-msg");
            
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email || !password) {
                errorDiv.innerText = "Error: All fields are required.";
            } else if (!emailPattern.test(email)) {
                errorDiv.innerText = "Error: Please enter a valid email address.";
            } else if (password.length < 6) {
                errorDiv.innerText = "Error: Credentials rejected (invalid password format).";
            } else {
                errorDiv.style.color = "green";
                errorDiv.innerText = "Validation passed! Checking database...";
                // In a real app, you would use fetch() here to send data to the backend.
            }
        });
    </script>
</body>
</html>
